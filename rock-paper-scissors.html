<!doctype html>

<html>
  <head>
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="styles/rock-paper-scissors.css" />
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button" onclick="playGame('Rock')">
      <img src="assets/rock-emoji.png" class="move-icon" />
    </button>

    <button class="move-button" onclick="playGame('Paper')">
      <img src="assets/paper-emoji.png" class="move-icon" />
    </button>
    <button class="move-button" onclick="playGame('Scissors')">
      <img src="assets/scissors-emoji.png" class="move-icon" />
    </button>

    <p class="outputResult"></p>

    <p class="outputChoose"></p>

    <p class="outputScore"></p>

    <p>
      <button
        onclick="
          score.Win = 0;
          score.Lose = 0;
          score.Tie = 0;
          localStorage.removeItem('score');
          outputScore();
        "
        class="reset-button"
      >
        Reset score
      </button>
    </p>

    <script src="script/rock-paper-scissors.js"></script>
  </body>
</html>
